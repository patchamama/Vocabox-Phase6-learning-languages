<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book base -->
  <rect x="96" y="160" width="320" height="240" rx="16" fill="#1e40af" opacity="0.6"/>
  <rect x="96" y="160" width="156" height="240" rx="16" fill="#1d4ed8" opacity="0.8"/>
  <rect x="248" y="160" width="168" height="240" rx="16" fill="#2563eb" opacity="0.7"/>
  <!-- Spine -->
  <rect x="244" y="156" width="24" height="248" rx="4" fill="url(#accent)"/>
  <!-- V shape on book -->
  <path d="M140 210 L200 340 L256 210" stroke="#93c5fd" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Lines on right page -->
  <rect x="280" y="220" width="100" height="10" rx="5" fill="#93c5fd" opacity="0.5"/>
  <rect x="280" y="248" width="80" height="10" rx="5" fill="#93c5fd" opacity="0.4"/>
  <rect x="280" y="276" width="90" height="10" rx="5" fill="#93c5fd" opacity="0.4"/>
  <rect x="280" y="304" width="70" height="10" rx="5" fill="#93c5fd" opacity="0.3"/>
</svg>
